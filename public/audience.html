<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audience Display – Quiz Management</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { overflow: hidden; }
    .aud-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      height: 100vh;
      overflow: hidden;
    }
    .aud-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      text-align: center;
      overflow-y: auto;
      position: relative;
    }
    .aud-sidebar {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.5rem 1rem;
    }
    .aud-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1.5rem;
      background: rgba(10,14,26,.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .aud-content {
      margin-top: 60px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .aud-timer {
      font-size: 6rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color .3s;
    }
    .aud-question-text {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.4;
      max-width: 800px;
    }
    .aud-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      max-width: 800px;
      width: 100%;
    }
    .aud-option {
      background: var(--bg3);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 500;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .aud-option .lbl {
      width: 2.2rem; height: 2.2rem;
      border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; flex-shrink: 0;
    }
    .aud-option.correct { border-color: var(--success); background: rgba(0,230,118,.08); }
    .aud-option.wrong   { border-color: var(--danger);  background: rgba(255,68,68,.08); }
    .sb-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem .5rem;
      border-bottom: 1px solid var(--border);
    }
    .sb-row:last-child { border-bottom: none; }
    .sb-rank {
      width: 2rem;
      text-align: center;
      font-weight: 800;
      color: var(--text-muted);
    }
    .sb-rank.gold   { color: #ffd700; }
    .sb-rank.silver { color: #c0c0c0; }
    .sb-rank.bronze { color: #cd7f32; }
    .sb-name { flex: 1; font-weight: 700; font-size: 1rem; }
    .sb-score { font-weight: 900; font-size: 1.3rem; color: var(--accent); font-variant-numeric: tabular-nums; }
    .sb-eliminated { opacity: .4; text-decoration: line-through; }
    .buzz-banner {
      font-size: 2rem;
      font-weight: 900;
      color: var(--warning);
      padding: 1rem 2rem;
      border: 3px solid var(--warning);
      border-radius: 14px;
      background: rgba(255,204,0,.1);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
    .idle-msg { color: var(--text-muted); font-size: 1.5rem; }
    .answer-flash-correct { animation: flash-correct .8s ease; border-radius:var(--radius); }
    .answer-flash-wrong   { animation: flash-wrong   .8s ease; border-radius:var(--radius); }
    .media-aud { max-width: 800px; width:100%; border-radius: 12px; overflow:hidden; background:#000; max-height:350px; display:flex; align-items:center; justify-content:center; }
    .media-aud img   { max-width:100%; max-height:350px; object-fit:contain; }
    .media-aud audio { width:100%; padding:1rem; }
    .media-aud video { max-width:100%; max-height:350px; }
  </style>
</head>
<body>
<div class="aud-layout">

  <!-- Main area -->
  <div class="aud-main">
    <div class="aud-header">
      <span style="font-weight:800;font-size:1.1rem;color:var(--accent)">🎯 Quiz Management</span>
      <span id="aud-round-badge" class="round-badge" style="display:none"></span>
      <span id="aud-connection" class="badge badge-danger">Connecting…</span>
    </div>

    <div class="aud-content" id="aud-content">
      <div class="idle-msg">⏳ Waiting for host to start the game…</div>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="aud-sidebar">
    <div class="card-title mb-2">🏆 Scoreboard</div>
    <div id="scoreboard"></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/audience.js"></script>
</body>
</html>
